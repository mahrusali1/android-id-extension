name: Build AndroidID Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repositori Bapak
      uses: actions/checkout@v4
      with:
        path: main-repo

    - name: Pinjam Library dari MIT
      uses: actions/checkout@v4
      with:
        repository: mit-cml/appinventor-sources
        path: mit-repo
        sparse-checkout: |
          appinventor/lib/appinventor/components.jar
          appinventor/lib/android/android-35/android.jar
        sparse-checkout-cone-mode: false

    - name: Sinkronisasi Folder
      run: |
        mkdir -p main-repo/lib/app-inventor
        mkdir -p main-repo/lib/android
        cp mit-repo/appinventor/lib/appinventor/components.jar main-repo/lib/app-inventor/
        cp mit-repo/appinventor/lib/android/android-35/android.jar main-repo/lib/android/android.jar
        echo "Cek integritas file:"
        ls -lh main-repo/lib/app-inventor/components.jar

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Eksekusi Ant Build
      run: |
        cd main-repo
        ant extensions

    - name: Upload AIX
      uses: actions/upload-artifact@v4
      with:
        name: AndroidID-Sempurna
        path: main-repo/out/*.aix
