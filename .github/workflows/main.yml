name: Build AndroidID Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ambil Library Otomatis
      run: |
        mkdir -p lib/android
        mkdir -p lib/app-inventor
        
        # Download Components.jar dari sumber stabil (untuk mengatasi error package not found)
        curl -L "https://github.com/vknow360/App-Inventor-Extension-Template/raw/master/lib/appinventor/components.jar" -o lib/app-inventor/components.jar
        
        # Download Android.jar (untuk mendukung fungsi sistem Android)
        curl -L "https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/android/android.jar" -o lib/android/android.jar

        echo "--- Verifikasi Library ---"
        ls -lh lib/app-inventor/
        ls -lh lib/android/

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Eksekusi Ant Build
      run: ant extensions

    - name: Kirim Hasil AIX ke Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-AndroidID-Bapak-Mahrus
        path: out/*.aix
