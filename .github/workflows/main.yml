name: Build Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Setup Lib Directory
      run: |
        mkdir -p lib/android lib/appinventor lib/ant-contrib
        
        # Mengambil library dari folder deps yang sudah ada di repo Anda
        cp deps/android/android.jar lib/android/ || echo "Android ID fail"
        cp -r deps/appinventor/* lib/appinventor/ || echo "App Inventor lib fail"
        cp deps/ant-contrib/ant-contrib-1.0b3.jar lib/ant-contrib/ || echo "Ant Contrib fail"

    - name: Build with Ant
      run: ant extensions

    - name: Upload Extension Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidID-AIX-Build
        path: out/*.aix
