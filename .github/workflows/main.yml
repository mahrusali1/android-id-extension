name: Build AndroidID Extension (Hybrid)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ambil Components Jar dan Verifikasi Library
      run: |
        # 1. Pastikan folder tujuan ada
        mkdir -p lib/app-inventor
        
        # 2. Ambil components.jar dari link MIT yang Bapak maksud
        # Kita gunakan jalur 'raw' agar bisa didownload sebagai file asli
        curl -L "https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/lib/appinventor/components.jar" -o lib/app-inventor/components.jar
        
        # 3. Verifikasi file yang Bapak upload manual + hasil download
        echo "--- Daftar Library di lib/app-inventor ---"
        ls -lh lib/app-inventor/
        
        # Peringatan jika file download ternyata kosong (404)
        if [ ! -s lib/app-inventor/components.jar ]; then
          echo "PERINGATAN: components.jar kosong/gagal ambil dari MIT."
        fi

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Jalankan Build Ant
      run: ant extensions

    - name: Simpan Hasil AIX
      uses: actions/upload-artifact@v4
      with:
        name: AndroidID-Final-Build
        path: out/*.aix
