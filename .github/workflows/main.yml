name: Build AndroidID Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ambil Library dari Sumber Resmi MIT
      run: |
        # Bersihkan folder library agar tidak ada file corrupt
        rm -rf lib/android lib/app-inventor
        mkdir -p lib/android lib/app-inventor
        
        # Mengambil components.jar langsung dari folder lib repositori MIT yang Bapak infokan
        curl -L "https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/lib/appinventor/components.jar" -o lib/app-inventor/components.jar
        
        # Mengambil android.jar (SDK 35) dari folder lib repositori MIT yang Bapak infokan
        curl -L "https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/lib/android/android-35/android.jar" -o lib/android/android.jar

        echo "--- Verifikasi File dari Sumber Resmi MIT ---"
        ls -lh lib/app-inventor/components.jar
        ls -lh lib/android/android.jar

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Eksekusi Ant Build
      run: ant extensions

    - name: Upload Hasil AIX
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-AndroidID-Bapak-Mahrus
        path: out/*.aix
