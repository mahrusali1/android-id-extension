name: Build Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Langkah ini akan menarik isi folder appinventor & deps

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Setup Lib Directory
      # Menghubungkan folder library dari submodule ke tempat yang dicari build.xml
      run: |
        mkdir -p lib/android
        mkdir -p lib/appinventor
        cp deps/android/android.jar lib/android/ || curl -L https://github.com/mit-cml/extension-template/raw/master/lib/android/android.jar -o lib/android/android.jar
        cp -r deps/appinventor/* lib/appinventor/ || echo "Using existing libs"

    - name: Build Extension
      run: ant extensions

    - name: Upload AIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidID-Extension
        path: out/*.aix
