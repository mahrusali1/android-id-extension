name: Build AndroidID Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ambil Library Baru dan Bersih
      run: |
        # Menghapus file lama yang terdeteksi rusak (Error ZIP)
        rm -rf lib/android lib/app-inventor
        mkdir -p lib/android lib/app-inventor
        
        # Download ulang menggunakan link yang Bapak buktikan berhasil
        curl -fL "https://github.com/vknow360/App-Inventor-Extension-Template/raw/master/lib/appinventor/components.jar" -o lib/app-inventor/components.jar
        curl -fL "https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/android/android.jar" -o lib/android/android.jar

        echo "--- Verifikasi Ukuran File ---"
        ls -lh lib/app-inventor/components.jar
        ls -lh lib/android/android.jar

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Eksekusi Ant Build
      run: ant extensions

    - name: Upload Hasil AIX
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-AndroidID-Bapak-Mahrus
        path: out/*.aix
