name: Build Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Setup Dependencies
      run: |
        mkdir -p lib/android lib/appinventor lib/ant-contrib
        
        # Mengunduh library langsung dari CDN yang stabil
        wget -q https://raw.githubusercontent.com/mit-cml/extension-template/master/lib/android/android.jar -O lib/android/android.jar
        wget -q https://raw.githubusercontent.com/mit-cml/extension-template/master/lib/appinventor/AnnotationProcessors.jar -O lib/appinventor/AnnotationProcessors.jar
        wget -q https://raw.githubusercontent.com/mit-cml/extension-template/master/lib/appinventor/CommonUtils.jar -O lib/appinventor/CommonUtils.jar
        wget -q https://raw.githubusercontent.com/mit-cml/extension-template/master/lib/appinventor/components.jar -O lib/appinventor/components.jar
        wget -q https://raw.githubusercontent.com/mit-cml/extension-template/master/lib/appinventor/dx.jar -O lib/appinventor/dx.jar
        wget -q https://raw.githubusercontent.com/mit-cml/extension-template/master/lib/ant-contrib/ant-contrib-1.0b3.jar -O lib/ant-contrib/ant-contrib-1.0b3.jar

    - name: Check Library Integrity
      # Jika file di bawah 100kb, kemungkinan besar itu bukan file .jar asli
      run: |
        find lib -name "*.jar" -exec ls -lh {} +

    - name: Build with Ant
      run: ant extensions

    - name: Upload AIX
      uses: actions/upload-artifact@v4
      with:
        name: AndroidID-v1
        path: out/*.aix
