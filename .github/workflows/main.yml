name: Build Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Setup Dependencies
      run: |
        mkdir -p lib/android lib/appinventor lib/ant-contrib
        
        # Menggunakan sumber dari pengembang ekstensi App Inventor yang stabil (Fastly/Rush/Niotes)
        # Android Jar
        curl -L https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/android/android.jar -o lib/android/android.jar
        
        # App Inventor Core Libs
        curl -L https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/appinventor/AnnotationProcessors.jar -o lib/appinventor/AnnotationProcessors.jar
        curl -L https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/appinventor/CommonUtils.jar -o lib/appinventor/CommonUtils.jar
        curl -L https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/appinventor/components.jar -o lib/appinventor/components.jar
        curl -L https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/appinventor/dx.jar -o lib/appinventor/dx.jar
        
        # Ant Contrib
        curl -L https://github.com/ShreyashSaitwal/AI2-Extension-Template-Template/raw/master/lib/ant-contrib/ant-contrib-1.0b3.jar -o lib/ant-contrib/ant-contrib-1.0b3.jar

    - name: Verify Jars
      # Langkah ini untuk memastikan file yang diunduh bukan file kosong/rusak
      run: |
        ls -lh lib/android/
        ls -lh lib/appinventor/

    - name: Build with Ant
      run: ant extensions

    - name: Upload Extension Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidID-AIX
        path: out/*.aix
